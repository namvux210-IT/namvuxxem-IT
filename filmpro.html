<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUE-MOVIE TV | GITHUB STABLE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --main-blue: #00d2ff; --dark-bg: #020202; --transition: all 0.3s ease; }
        body { margin: 0; background: radial-gradient(circle at top right, #001a33, var(--dark-bg) 85%); color: #d1d1d1; font-family: sans-serif; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,210,255,0.2); padding: 12px 0; }
        .nav-content { display: flex; align-items: center; justify-content: space-between; gap: 15px; flex-wrap: wrap; }
        .logo { font-size: 24px; font-weight: 900; font-style: italic; background: linear-gradient(135deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; text-decoration: none; }
        .server-switcher { display: flex; background: #111; padding: 3px; border-radius: 20px; border: 1px solid #333; }
        .server-btn { padding: 6px 12px; border-radius: 15px; font-size: 10px; font-weight: bold; color: #666; background: none; border: none; cursor: pointer; }
        .server-btn.active { background: var(--main-blue); color: #000; }
        .search-box { position: relative; min-width: 200px; }
        .search-box input { width: 100%; background: #111; border: 1px solid #333; border-radius: 20px; padding: 8px 12px 8px 35px; color: white; outline: none; font-size: 13px; }
        .search-box i { position: absolute; left: 12px; top: 10px; color: #555; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
        .filter-btn { padding: 7px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; background: #1a1a1a; color: white; transition: var(--transition); }
        .filter-btn:hover { background: var(--main-blue); color: black; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .movie-card { background: rgba(20,20,20,0.8); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: var(--transition); position: relative; }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--main-blue); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { padding: 10px; }
        .movie-title { font-size: 13px; font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 5px; }
        .player-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .player-content { width: 100%; max-width: 900px; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 5px; }
        .episode-container { margin-top: 15px; max-height: 150px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #111; border-radius: 5px; }
        .ep-btn { padding: 6px 12px; background: #222; border: 1px solid #444; color: white; border-radius: 3px; cursor: pointer; font-size: 11px; }
        .ep-btn.active { background: var(--main-blue); color: black; }
        .close-btn { align-self: flex-end; color: white; font-size: 28px; cursor: pointer; margin-bottom: 5px; }
        .status-msg { text-align: center; width: 100%; padding: 40px; color: var(--main-blue); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <h1 class="logo" onclick="location.reload()">BLUE-MOVIE</h1>
            <div class="server-switcher">
                <button id="btn-ophim" onclick="switchServer('ophim')" class="server-btn active">OPHIM</button>
                <button id="btn-nguonc" onclick="switchServer('nguonc')" class="server-btn">NGUONC</button>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" onkeyup="if(event.key === 'Enter') searchMovies()" placeholder="Tìm phim...">
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="filter-bar">
            <button onclick="fetchAPI(currentConfig.newPath)" class="filter-btn">MỚI NHẤT</button>
            <button onclick="fetchAPI(currentConfig.seriesPath)" class="filter-btn">PHIM BỘ</button>
            <button onclick="fetchAPI(currentConfig.moviePath)" class="filter-btn">PHIM LẺ</button>
            <button onclick="fetchAPI('the-loai/hanh-dong')" class="filter-btn">HÀNH ĐỘNG</button>
            <button onclick="fetchAPI('the-loai/hoat-hinh')" class="filter-btn">HOẠT HÌNH</button>
        </div>
        <h2 id="sectionTitle" style="border-left: 4px solid var(--main-blue); padding-left: 12px; font-size: 18px;">Phim Mới Cập Nhật</h2>
        <div id="movieContainer" class="movie-grid"></div>
        <div style="text-align: center; margin: 30px 0 50px;">
            <button onclick="changePage(-1)" class="filter-btn">TRƯỚC</button>
            <span id="pageLabel" style="margin: 0 15px; font-size: 13px;">Trang 1</span>
            <button onclick="changePage(1)" class="filter-btn">SAU</button>
        </div>
    </div>

    <div id="playerOverlay" class="player-overlay">
        <div class="player-content">
            <div class="close-btn" onclick="closePlayer()">&times;</div>
            <video id="videoPlayer" controls autoplay></video>
            <div id="episodeList" class="episode-container"></div>
        </div>
    </div>

    <script>
        const config = {
            ophim: {
                api: "https://ophim1.com/api/_api/v1", // Dùng endpoint ổn định cho web
                img: "https://img.otruyenapi.com/uploads/movies/",
                newPath: "danh-sach/phim-moi-cap-nhat",
                seriesPath: "danh-sach/phim-bo",
                moviePath: "danh-sach/phim-le"
            },
            nguonc: {
                api: "https://phim.nguonc.com/api/vi2/_api/v1",
                img: "https://phim.nguonc.com/uploads/movies/",
                newPath: "danh-sach/phim-moi-cap-nhat",
                seriesPath: "danh-sach/phim-bo",
                moviePath: "danh-sach/phim-le"
            }
        };

        let currentServer = 'ophim';
        let currentConfig = config.ophim;
        let currentPage = 1;
        let currentPath = currentConfig.newPath;
        const video = document.getElementById('videoPlayer');
        const hls = new Hls();

        function switchServer(server) {
            currentServer = server;
            currentConfig = config[server];
            document.getElementById('btn-ophim').className = server === 'ophim' ? 'server-btn active' : 'server-btn';
            document.getElementById('btn-nguonc').className = server === 'nguonc' ? 'server-btn active' : 'server-btn';
            fetchAPI(currentConfig.newPath, 1);
        }

        async function fetchAPI(path, page = 1) {
            currentPath = path; currentPage = page;
            const container = document.getElementById('movieContainer');
            container.innerHTML = '<div class="status-msg">ĐANG TẢI DỮ LIỆU...</div>';
            document.getElementById('pageLabel').innerText = "Trang " + page;

            try {
                const url = `${currentConfig.api}/${path}${path.includes('?') ? '&' : '?'}page=${page}`;
                const res = await fetch(url);
                if(!res.ok) throw new Error();
                const result = await res.json();
                renderMovies(result.data.items);
                document.getElementById('sectionTitle').innerText = result.data.titlePage || "Kết quả";
            } catch (e) {
                container.innerHTML = '<div class="status-msg" style="color:#ff4d4d">KHÔNG THỂ KẾT NỐI SERVER. VUI LÒNG THỬ LẠI!</div>';
            }
        }

        function renderMovies(movies) {
            const container = document.getElementById('movieContainer');
            if(!movies || movies.length === 0) { container.innerHTML = '<div class="status-msg">Không tìm thấy phim.</div>'; return; }
            container.innerHTML = movies.map(movie => {
                const img = movie.thumb_url.includes('http') ? movie.thumb_url : currentConfig.img + movie.thumb_url;
                return `
                    <div class="movie-card" onclick="playMovie('${movie.slug}')">
                        <img src="${img}" alt="${movie.name}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="movie-info">
                            <p class="movie-title">${movie.name}</p>
                            <div class="movie-meta"><span>${movie.year}</span><span style="color:var(--main-blue)">${movie.episode_current}</span></div>
                        </div>
                    </div>`;
            }).join('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function playMovie(slug) {
            try {
                const res = await fetch(`${currentConfig.api}/phim/${slug}`);
                const data = await res.json();
                const movie = data.data.item;
                const episodes = movie.episodes[0].server_data;
                document.getElementById('playerOverlay').style.display = 'flex';
                const epList = document.getElementById('episodeList');
                epList.innerHTML = episodes.map(ep => `<button class="ep-btn" onclick="loadVideo('${ep.link_m3u8}', this)">${ep.name}</button>`).join('');
                loadVideo(episodes[0].link_m3u8, epList.firstChild);
            } catch (e) { alert("Lỗi tải link phim!"); }
        }

        function loadVideo(url, btn) {
            if (Hls.isSupported()) { hls.loadSource(url); hls.attachMedia(video); hls.on(Hls.Events.MANIFEST_PARSED, () => video.play()); }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; video.play(); }
            document.querySelectorAll('.ep-btn').forEach(b => b.className = 'ep-btn');
            if(btn) btn.className = 'ep-btn active';
        }

        function closePlayer() { video.pause(); hls.detachMedia(); document.getElementById('playerOverlay').style.display = 'none'; }
        function searchMovies() { const k = document.getElementById('searchInput').value; if(k) fetchAPI(`tim-kiem?keyword=${k}`, 1); }
        function changePage(s) { if(currentPage + s >= 1) fetchAPI(currentPath, currentPage + s); }

        window.onload = () => fetchAPI(currentConfig.newPath, 1);
    </script>
</body>
</html>
